<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificate of Completion</title>
    <style>
      @page {
        size: A4 landscape;
        margin: 15mm;
      }

      body {
        font-family: "Times New Roman", serif;
        text-align: center;
        padding: 20px;
        background: #f8f9fa;
        margin: 0;
      }

      .certificate {
        border: 8px double #8b0000;
        padding: 50px;
        background: white;
        max-width: 850px;
        margin: 0 auto;
        position: relative;
      }

      .ornament {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        height: 50px;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20"><polygon points="50,2 60,18 40,18" fill="%238b0000"/></svg>')
          repeat-x;
      }

      .title {
        font-size: 42px;
        font-weight: bold;
        color: #8b0000;
        margin: 60px 0 20px 0;
        text-transform: uppercase;
        letter-spacing: 4px;
      }

      .subtitle {
        font-size: 18px;
        color: #444;
        margin-bottom: 30px;
        font-style: italic;
      }

      .recipient {
        font-size: 32px;
        color: #000;
        font-weight: bold;
        margin: 30px 0;
        text-decoration: underline;
        text-decoration-color: #8b0000;
      }

      .completion-text {
        font-size: 18px;
        color: #333;
        margin: 25px 0;
        line-height: 1.8;
      }

      .course-name {
        font-size: 24px;
        color: #8b0000;
        font-weight: bold;
        margin: 20px 0;
      }

      .details {
        display: flex;
        justify-content: space-between;
        margin-top: 40px;
        font-size: 14px;
        color: #666;
      }

      .seal {
        position: absolute;
        bottom: 30px;
        right: 30px;
        width: 80px;
        height: 80px;
        border: 3px solid #8b0000;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f0f0f0;
        font-size: 12px;
        font-weight: bold;
        color: #8b0000;
      }
    </style>
  </head>
  <body>
    <div class="certificate">
      <div class="ornament"></div>

      <div class="title">Certificate of Completion</div>
      <div class="subtitle">Presented to</div>

      <div class="recipient">{{ recipient_name }}</div>

      <div class="completion-text">
        for successfully completing the training program
      </div>

      <div class="course-name">{{ course_name }}</div>

      <div class="completion-text">
        {{ completion_date }}<br />
        Duration: {{ duration_hours }} hours
      </div>

      <div class="details">
        <div><strong>Certificate ID:</strong> {{ certificate_id }}</div>
        <div><strong>Issued by:</strong> {{ issuer_name }}</div>
      </div>

      <div class="seal">OFFICIAL<br />SEAL</div>
    </div>
  </body>
</html>
