<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificate of Achievement</title>
    <style>
      @page {
        size: A4 landscape;
        margin: 20mm;
      }

      body {
        font-family: "Georgia", serif;
        text-align: center;
        padding: 40px;
        background: linear-gradient(45deg, #f0f8ff, #e6f3ff);
        margin: 0;
      }

      .certificate {
        border: 10px solid #2c5aa0;
        padding: 40px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        max-width: 800px;
        margin: 0 auto;
      }

      .title {
        font-size: 48px;
        font-weight: bold;
        color: #2c5aa0;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 3px;
      }

      .subtitle {
        font-size: 24px;
        color: #666;
        margin-bottom: 40px;
      }

      .recipient {
        font-size: 36px;
        color: #2c5aa0;
        font-weight: bold;
        margin: 40px 0;
        border-bottom: 3px solid #2c5aa0;
        display: inline-block;
        padding-bottom: 10px;
      }

      .achievement {
        font-size: 20px;
        color: #444;
        margin: 30px 0;
        line-height: 1.6;
      }

      .date {
        font-size: 16px;
        color: #666;
        margin-top: 40px;
      }

      .signature {
        display: flex;
        justify-content: space-between;
        margin-top: 50px;
        padding-top: 20px;
      }

      .signature-line {
        border-top: 2px solid #2c5aa0;
        width: 200px;
        text-align: center;
        padding-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="certificate">
      <div class="title">Certificate of Achievement</div>
      <div class="subtitle">This is to certify that</div>

      <div class="recipient">{{ recipient_name }}</div>

      <div class="achievement">
        has successfully completed the course<br />
        <strong>{{ course_name }}</strong><br />
        and demonstrated excellence in {{ subject_area }}
      </div>

      <div class="date">Awarded on {{ date }}</div>

      <div class="signature">
        <div class="signature-line">
          <div>{{ instructor_name }}</div>
          <div>Instructor</div>
        </div>
        <div class="signature-line">
          <div>{{ organization_name }}</div>
          <div>Organization</div>
        </div>
      </div>
    </div>
  </body>
</html>
